<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f5; color: #333; }
.app { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
.logo { width: 36px; height: 36px; background: #F2A0B5; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.logo svg { width: 20px; height: 20px; fill: white; }
.header h1 { font-size: 18px; font-weight: 500; }
.tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid #e5e5e5; }
.tab { padding: 8px 16px; font-size: 14px; background: none; border: none; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: #F2A0B5; border-bottom-color: #F2A0B5; font-weight: 500; }
.section { display: none; }
.section.active { display: block; }
.input-row { display: flex; gap: 8px; margin-bottom: 1.5rem; }
.input-row input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; }
.input-row input:focus { outline: none; border-color: #F2A0B5; }
.btn { padding: 8px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; background: #fff; white-space: nowrap; }
.btn:hover { background: #f5f5f5; }
.btn.primary { background: #F2A0B5; border-color: #F2A0B5; color: white; }
.btn.primary:hover { background: #E8899E; }
.btn.cancel { background: #e53935; border-color: #e53935; color: white; }
.btn.cancel:hover { background: #c62828; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.status { font-size: 13px; color: #888; margin-bottom: 1rem; min-height: 20px; }
.status.error { color: #e53935; }
.status.loading { color: #F2A0B5; }
.summary-bar { display: flex; gap: 12px; margin-bottom: 1.5rem; }
.metric { flex: 1; background: #fff; border-radius: 8px; padding: 0.75rem 1rem; border: 1px solid #eee; }
.metric .label { font-size: 12px; color: #888; margin-bottom: 4px; }
.metric .value { font-size: 22px; font-weight: 500; }
.comment-card { background: #fff; border-bottom: 1px solid #eee; padding: 14px 16px; display: flex; gap: 12px; align-items: center; cursor: pointer; }
.replied-btn { flex-shrink: 0; margin-left: auto; padding: 4px 12px; font-size: 12px; border: 1px solid #ccc; border-radius: 4px; background: #fff; color: #666; cursor: pointer; white-space: nowrap; }
.replied-btn:hover { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
.comment-card:hover { background: #f9f9f9; }
.comment-card.read { opacity: 0.45; }
.notif-icon { flex-shrink: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
.notif-icon svg { width: 22px; height: 22px; fill: #5B9BD5; }
.notif-avatar { flex-shrink: 0; width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #eee; }
.notif-content { flex: 1; min-width: 0; }
.notif-text { font-size: 14px; line-height: 1.5; color: #333; margin-bottom: 2px; }
.notif-text .notif-name { font-weight: 700; }
.notif-article-title { font-size: 13px; color: #666; line-height: 1.4; margin-bottom: 2px; }
.notif-time { font-size: 12px; color: #999; }
.comment-actions { display: flex; gap: 8px; margin-top: 6px; }
.btn-sm { padding: 4px 12px; font-size: 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: #fff; text-decoration: none; display: inline-block; color: #333; }
.btn-sm:hover { background: #f5f5f5; }
.feed-card { background: #fff; border: 1px solid #eee; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 12px; display: flex; gap: 12px; align-items: flex-start; }
.feed-thumb { width: 72px; height: 48px; border-radius: 6px; object-fit: cover; background: #eee; flex-shrink: 0; }
.feed-info { flex: 1; min-width: 0; }
.feed-info .creator { font-size: 12px; color: #888; margin-bottom: 4px; }
.feed-info .title { font-size: 14px; font-weight: 500; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.feed-info .title a { color: #333; text-decoration: none; }
.feed-info .title a:hover { color: #F2A0B5; }
.feed-info .date { font-size: 12px; color: #aaa; }
.feed-group { margin-bottom: 1.5rem; }
.feed-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #F2A0B5; cursor: pointer; user-select: none; }
.feed-group-header .group-toggle { font-size: 12px; color: #888; transition: transform 0.2s; display: inline-block; }
.feed-group-header.collapsed .group-toggle { transform: rotate(-90deg); }
.feed-group-header .group-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
.feed-group-header .group-name { font-size: 15px; font-weight: 600; color: #333; }
.feed-group-header .group-count { font-size: 12px; color: #888; background: #f0f0f0; border-radius: 99px; padding: 2px 8px; }
.feed-group-header .group-actions { margin-left: auto; }
.feed-group-body.collapsed { display: none; }
.comment-card.read { opacity: 0.45; }
.feed-card.read { opacity: 0.45; }
.feed-card .read-btn { padding: 4px 10px; font-size: 11px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; color: #888; flex-shrink: 0; align-self: center; }
.feed-card .read-btn:hover { background: #f0f0f0; }
.feed-card .read-btn.is-read { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; }
.feed-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; }
.feed-toolbar .btn-sm { padding: 4px 12px; font-size: 12px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: #fff; }
.feed-toolbar .btn-sm:hover { background: #f5f5f5; }
.creator-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.creator-row input { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
.creator-row input:focus { outline: none; border-color: #F2A0B5; }
.creator-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
.creator-tag { display: flex; align-items: center; gap: 4px; padding: 4px 10px; background: #f0f0f0; border-radius: 99px; font-size: 13px; }
.creator-tag button { background: none; border: none; cursor: pointer; color: #aaa; font-size: 14px; padding: 0; line-height: 1; }
.creator-tag button:hover { color: #e53935; }
.empty { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/><path d="M14.5 9.5l1.5-1.5 1.5 1.5M16 8v5" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>のーとびより β</h1>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('comments',this)">コメント管理</button>
    <button class="tab" onclick="switchTab('feed',this)">フィード</button>
  </div>

  <div id="comments" class="section active">
    <div class="input-row">
      <input type="text" id="urlname-input" placeholder="note ID（例: kyownruby）" onkeydown="if(event.key==='Enter')fetchArticles()" />
      <div style="display:flex;align-items:center;gap:8px;flex:none">
        <label style="font-size:13px;color:#ccc;display:flex;align-items:center;gap:3px;cursor:pointer">
          <input type="radio" name="fetch-mode" value="count" checked onchange="document.getElementById('article-count').disabled=false"> 件数指定
        </label>
        <input type="number" id="article-count" value="3" min="1" max="50" style="width:60px;flex:none;text-align:center" title="取得する記事数" onblur="if(this.value>50)this.value=50;if(this.value<1)this.value=1" />
        <span style="font-size:13px;color:#888">件</span>
        <label style="font-size:13px;color:#ccc;display:flex;align-items:center;gap:3px;cursor:pointer">
          <input type="radio" name="fetch-mode" value="all" onchange="document.getElementById('article-count').disabled=true"> 全件
        </label>
      </div>
      <button class="btn primary" onclick="fetchArticles()" id="fetch-btn">取得</button>
    </div>
    <p style="font-size:12px;color:#aaa;margin:-1rem 0 1rem 0;">件数指定: 最新の公開記事から指定件数を取得（最大50件） ／ 全件: 2025/9/8以降の全記事を取得</p>
    <div id="comment-status" class="status"></div>
    <div id="summary-bar" class="summary-bar" style="display:none">
      <div class="metric"><div class="label">未返信</div><div class="value" id="m-articles" style="color:#E65100">0</div></div>
    </div>
    <div id="comment-list"></div>
  </div>

  <div id="feed" class="section">
    <div class="creator-row">
      <input type="text" id="creator-input" placeholder="クリエイターのアカウント名" onkeydown="if(event.key==='Enter')addCreator()" />
      <button class="btn" onclick="addCreator()">追加</button>
      <button class="btn primary" onclick="fetchFeeds()" id="feed-btn">更新</button>
    </div>
    <div id="creator-tags" class="creator-tags"></div>
    <div id="feed-status" class="status"></div>
    <div id="feed-toolbar" class="feed-toolbar" style="display:none">
      <button class="btn-sm" onclick="markAllRead()">全記事を既読</button>
      <label style="font-size:12px;color:#888;margin-left:auto;display:flex;align-items:center;gap:4px;">
        <input type="checkbox" id="hide-read-toggle" onchange="toggleHideRead()"> 既読を非表示
      </label>
    </div>
    <div id="feed-list"></div>
  </div>
</div>

<script>
const CORS_PROXIES = [
  url => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(url),
  url => 'https://corsproxy.io/?' + encodeURIComponent(url),
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
];
async function fetchWithCors(url) {
  const cacheBuster = (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
  const noCacheUrl = url + cacheBuster;
  for (const proxy of CORS_PROXIES) {
    try {
      const res = await fetch(proxy(noCacheUrl), { cache: 'no-store' });
      if (!res.ok) {
        console.warn(`[note-mgr] Proxy returned ${res.status} for ${url}`);
        continue;
      }
      const body = await res.text();
      if (!body || body.length === 0) {
        console.warn(`[note-mgr] Proxy returned empty body for ${url}`);
        continue;
      }
      return new Response(body, {
        status: res.status,
        headers: { 'content-type': res.headers.get('content-type') || 'text/plain' }
      });
    } catch(e) {
      console.warn(`[note-mgr] Proxy failed for ${url}:`, e.message);
    }
  }
  // Direct fetch as last resort
  try {
    const res = await fetch(noCacheUrl, { cache: 'no-store' });
    if (!res.ok) return null;
    const body = await res.text();
    if (!body) return null;
    return new Response(body, {
      status: res.status,
      headers: { 'content-type': res.headers.get('content-type') || 'text/plain' }
    });
  } catch(e) { return null; }
}
function parseRSS(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const items = [];
  doc.querySelectorAll('item').forEach(el => {
    const get = tag => (el.querySelector(tag) ? el.querySelector(tag).textContent : '');
    let thumb = '';
    const enc = el.querySelector('enclosure');
    if (enc && enc.getAttribute('type')?.startsWith('image')) thumb = enc.getAttribute('url') || '';
    if (!thumb) { const m = get('description').match(/<img[^>]+src=["']([^"']+)/); if (m) thumb = m[1]; }
    items.push({ title: get('title'), link: get('link'), pubDate: get('pubDate'), thumbnail: thumb, description: get('description') });
  });
  return items;
}
let checkedArticles = JSON.parse(localStorage.getItem('nc_checked') || '[]');
let repliedComments = JSON.parse(localStorage.getItem('nc_replied') || '[]');
let fetchCancelled = false;
let creators = JSON.parse(localStorage.getItem('nc_creators') || '[]');
let readFeeds = JSON.parse(localStorage.getItem('nc_read_feeds') || '[]');
let expandedGroups = JSON.parse(localStorage.getItem('nc_expanded_groups') || '[]');
let hideRead = JSON.parse(localStorage.getItem('nc_hide_read') || 'false');

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(tab).classList.add('active');
}

function saveChecked() { localStorage.setItem('nc_checked', JSON.stringify(checkedArticles)); }
function saveCreators() { localStorage.setItem('nc_creators', JSON.stringify(creators)); }
function saveReadFeeds() { localStorage.setItem('nc_read_feeds', JSON.stringify(readFeeds)); }
function saveExpanded() { localStorage.setItem('nc_expanded_groups', JSON.stringify(expandedGroups)); }

function feedId(item) { return item.link || item.guid || (item.creatorName + ':' + item.title); }

function toggleGroup(creator) {
  const idx = expandedGroups.indexOf(creator);
  if (idx >= 0) expandedGroups.splice(idx, 1);
  else expandedGroups.push(creator);
  saveExpanded();
  const header = document.querySelector(`[data-group="${creator}"]`);
  const body = document.querySelector(`[data-group-body="${creator}"]`);
  if (header) header.classList.toggle('collapsed');
  if (body) body.classList.toggle('collapsed');
}

function updateGroupCount(creator) {
  const body = document.querySelector(`[data-group-body="${creator}"]`);
  const header = document.querySelector(`[data-group="${creator}"]`);
  if (!body || !header) return;
  const unread = body.querySelectorAll('.feed-card:not(.read)').length;
  const countEl = header.querySelector('.group-count');
  if (countEl) countEl.textContent = unread > 0 ? unread + '件の新着' : '新着なし';
}

function markFeedRead(id) {
  const card = document.querySelector(`[data-feed-id="${CSS.escape(id)}"]`);
  const isRead = readFeeds.includes(id);
  if (isRead) {
    readFeeds.splice(readFeeds.indexOf(id), 1);
  } else {
    readFeeds.push(id);
  }
  saveReadFeeds();
  if (card) {
    card.classList.toggle('read', !isRead);
    const btn = card.querySelector('.read-btn');
    if (btn) { btn.textContent = !isRead ? '既読' : '既読にする'; btn.classList.toggle('is-read', !isRead); }
    if (!isRead && hideRead) card.style.display = 'none';
    if (isRead) card.style.display = '';
    const group = card.closest('[data-creator]');
    if (group) updateGroupCount(group.dataset.creator);
  }
}

function markCreatorRead(creator) {
  document.querySelectorAll(`[data-group-body="${creator}"] .feed-card`).forEach(card => {
    const id = card.dataset.feedId;
    if (id && !readFeeds.includes(id)) readFeeds.push(id);
    card.classList.add('read');
    const btn = card.querySelector('.read-btn');
    if (btn) { btn.textContent = '既読'; btn.classList.add('is-read'); }
    if (hideRead) card.style.display = 'none';
  });
  saveReadFeeds();
  updateGroupCount(creator);
}

function updateAllGroupCounts() {
  document.querySelectorAll('[data-creator]').forEach(body => updateGroupCount(body.dataset.creator));
}

function markAllRead() {
  document.querySelectorAll('.feed-card').forEach(card => {
    const id = card.dataset.feedId;
    if (id && !readFeeds.includes(id)) readFeeds.push(id);
    card.classList.add('read');
    const btn = card.querySelector('.read-btn');
    if (btn) { btn.textContent = '既読'; btn.classList.add('is-read'); }
    if (hideRead) card.style.display = 'none';
  });
  saveReadFeeds();
  updateAllGroupCounts();
}

function toggleHideRead() {
  hideRead = document.getElementById('hide-read-toggle').checked;
  localStorage.setItem('nc_hide_read', JSON.stringify(hideRead));
  document.querySelectorAll('.feed-card.read').forEach(card => {
    card.style.display = hideRead ? 'none' : '';
  });
}

function truncateTitle(title, maxLen) {
  if (!title) return '';
  return title.length > maxLen ? title.slice(0, maxLen) + '...' : title;
}

function extractNoteKey(url) {
  if (!url) return null;
  const m = url.match(/\/n\/([a-zA-Z0-9]+)/);
  return m ? m[1] : null;
}

async function fetchCommentsForNote(noteKey) {
  const apiUrl = `https://note.com/api/v3/notes/${noteKey}/note_comments`;
  const res = await fetchWithCors(apiUrl);
  if (!res || !res.ok) {
    console.warn(`[note-mgr] Comment API failed for ${noteKey}:`, res?.status);
    return [];
  }
  try {
    const text = await res.text();
    const data = JSON.parse(text);
    console.log(`[note-mgr] Comments for ${noteKey}:`, data);
    // v3 API: { data: [...], current_page, total_count }
    if (Array.isArray(data.data)) return data.data;
    return data.data?.note_comments || data.data?.comments || [];
  } catch(e) {
    console.warn(`[note-mgr] JSON parse error for ${noteKey}:`, e.message);
    return [];
  }
}

function filterUnrepliedComments(comments, ownerUrlname) {
  console.log(`[note-mgr] Filter: ownerUrlname="${ownerUrlname}", total=${comments.length}`);
  if (comments.length > 0) {
    console.log('[note-mgr] Sample comment object:', JSON.stringify(comments[0], null, 2));
  }
  const result = comments.filter(c => {
    const userUrlname = c.user?.urlname;
    const isOwner = userUrlname === ownerUrlname;
    const replyCount = c.reply_count ?? c.sub_comment_count ?? c.children_count
      ?? (c.sub_comments || c.children || []).length ?? 0;
    console.log(`[note-mgr] Comment by "${userUrlname}", isOwner=${isOwner}, replyCount=${replyCount}`);
    if (isOwner) return false;
    return replyCount === 0;
  });
  console.log(`[note-mgr] After filter: ${result.length} unreplied`);
  return result;
}

async function fetchAllArticlesViaAPI(urlname, statusEl) {
  const cutoff = new Date('2025-09-08T10:00:00+09:00').getTime();
  const articles = [];
  let page = 1;
  while (true) {
    if (fetchCancelled) break;
    statusEl.textContent = `全記事を取得中...（${articles.length}件取得済、ページ${page}）`;
    const apiUrl = `https://note.com/api/v2/creators/${urlname}/contents?kind=note&page=${page}&per=20`;
    const res = await fetchWithCors(apiUrl);
    if (!res || !res.ok) break;
    const data = await res.json();
    const notes = data.data?.contents || [];
    if (notes.length === 0) break;
    let reachedCutoff = false;
    for (const n of notes) {
      const pubTime = new Date(n.publishAt || n.published_at || n.createdAt || n.created_at).getTime();
      if (pubTime < cutoff) { reachedCutoff = true; break; }
      articles.push({
        title: n.name || n.title || '',
        link: `https://note.com/${urlname}/n/${n.key}`,
        pubDate: n.publishAt || n.published_at || n.createdAt || n.created_at || '',
        thumbnail: n.eyecatch || '',
        description: n.body || ''
      });
    }
    if (reachedCutoff || !data.data?.is_last_page === false) break;
    if (data.data?.is_last_page) break;
    page++;
  }
  return articles;
}

function cancelFetch() {
  fetchCancelled = true;
}
async function fetchArticles() {
  const urlname = document.getElementById('urlname-input').value.trim();
  if (!urlname) return;
  const status = document.getElementById('comment-status');
  const list = document.getElementById('comment-list');
  const btn = document.getElementById('fetch-btn');
  fetchCancelled = false;
  btn.textContent = '中止';
  btn.classList.add('cancel');
  btn.onclick = cancelFetch;
  list.innerHTML = '';
  document.getElementById('summary-bar').style.display = 'none';
  status.className = 'status loading';

  const fetchMode = document.querySelector('input[name="fetch-mode"]:checked').value;

  try {
    let articles;
    if (fetchMode === 'all') {
      status.textContent = '全記事を取得中...';
      articles = await fetchAllArticlesViaAPI(urlname, status);
      if (fetchCancelled) throw new Error('取得を中止しました');
      if (articles.length === 0) throw new Error('記事が見つかりませんでした');
    } else {
      const countEl = document.getElementById('article-count');
      const articleCount = Math.max(1, Math.min(50, parseInt(countEl.value) || 1));
      countEl.value = articleCount;
      status.textContent = `公開記事を取得中...`;
      const allNotes = [];
      let page = 1;
      const perPage = 20;
      while (allNotes.length < articleCount) {
        if (fetchCancelled) throw new Error('取得を中止しました');
        const apiUrl = `https://note.com/api/v2/creators/${urlname}/contents?kind=note&page=${page}&per=${perPage}`;
        const res = await fetchWithCors(apiUrl);
        if (!res || !res.ok) throw new Error('記事の取得に失敗しました。アカウント名を確認してください');
        const data = await res.json();
        const notes = data.data?.contents || [];
        if (notes.length === 0) break;
        allNotes.push(...notes);
        if (data.data?.is_last_page) break;
        page++;
      }
      if (fetchCancelled) throw new Error('取得を中止しました');
      if (allNotes.length === 0) throw new Error('記事が見つかりませんでした');
      articles = allNotes.slice(0, articleCount).map(n => ({
        title: n.name || n.title || '',
        link: `https://note.com/${urlname}/n/${n.key}`,
        pubDate: n.publishAt || n.published_at || n.createdAt || n.created_at || '',
        thumbnail: n.eyecatch || '',
        description: n.body || ''
      }));
    }

    status.textContent = `${articles.length}件の記事の未返信コメントを取得中...（0/${articles.length}）`;

    let totalComments = 0;
    let articlesWithComments = 0;

    for (let i = 0; i < articles.length; i++) {
      if (fetchCancelled) throw new Error('取得を中止しました');
      const a = articles[i];
      const noteKey = extractNoteKey(a.link);
      let comments = [];
      if (noteKey) {
        const allComments = await fetchCommentsForNote(noteKey);
        if (fetchCancelled) throw new Error('取得を中止しました');
        comments = filterUnrepliedComments(allComments, urlname);
      }
      status.textContent = `${articles.length}件の記事の未返信コメントを取得中...（${i + 1}/${articles.length}）`;

      const id = feedId(a);
      const date = a.pubDate ? new Date(a.pubDate).toLocaleDateString('ja-JP') : '';
      const isChecked = checkedArticles.includes(id);
      if (comments.length > 0) {
        const unreplied = comments.filter(c => !repliedComments.includes(c.key || ''));
        articlesWithComments += unreplied.length > 0 ? 1 : 0;
        totalComments += unreplied.length;
        unreplied.forEach(c => {
          const cDate = c.created_at ? new Date(c.created_at).toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
          const avatar = c.user?.profile_image_url || '';
          const userName = c.user?.nickname || c.user?.urlname || '匿名';
          const shortTitle = truncateTitle(a.title, 32);
          const commentKey = c.key || '';
          const commentUrl = a.link ? a.link + '?from=notice&scrollpos=comment&c=' + commentKey : '#';
          list.innerHTML += '<div class="comment-card ' + (isChecked ? 'read' : '') + '" data-article-id="' + id + '" data-comment-key="' + commentKey + '" onclick="window.open(\'' + commentUrl.replace(/'/g, "\\'") + '\',\'_blank\')">'
            + '<div class="notif-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg></div>'
            + (avatar ? '<img class="notif-avatar" src="' + avatar + '" onerror="this.style.display=\'none\'" />' : '<div class="notif-avatar"></div>')
            + '<div class="notif-content">'
            + '<div class="notif-text"><span class="notif-name">' + userName + '</span>さんがあなたの記事にコメントしました</div>'
            + '<div class="notif-article-title">' + shortTitle + '</div>'
            + '<div class="notif-time">' + cDate + '</div>'
            + '</div>'
            + '<button class="replied-btn" onclick="event.stopPropagation();markReplied(this)">返信済み</button>'
            + '</div>';
        });
      }
    }

    document.getElementById('m-articles').textContent = totalComments;
    document.getElementById('summary-bar').style.display = 'flex';

    if (totalComments === 0) {
      list.innerHTML = '<div class="empty">最新' + articles.length + '件の記事に未返信コメントはありません</div>';
    }

    status.className = 'status';
    status.textContent = `完了 — 最新${articles.length}件の記事から${totalComments}件の未返信コメントを検出`;
  } catch(e) {
    status.className = 'status' + (fetchCancelled ? '' : ' error');
    status.textContent = e.message;
  }
  btn.textContent = '取得';
  btn.classList.remove('cancel');
  btn.onclick = function() { fetchArticles(); };
}

function markReplied(btn) {
  const card = btn.closest('.comment-card');
  if (card) {
    const key = card.dataset.commentKey;
    if (key && !repliedComments.includes(key)) {
      repliedComments.push(key);
      localStorage.setItem('nc_replied', JSON.stringify(repliedComments));
    }
    card.style.display = 'none';
    const counter = document.getElementById('m-articles');
    const current = parseInt(counter.textContent) || 0;
    if (current > 0) counter.textContent = current - 1;
  }
}

function markChecked(id) {
  if (!checkedArticles.includes(id)) checkedArticles.push(id);
  saveChecked();
  const card = document.querySelector(`[data-article-id="${CSS.escape(id)}"]`);
  if (card) {
    card.classList.add('read');
    const btn = card.querySelector('.btn-sm:last-child');
    if (btn) { btn.textContent = '確認済み'; btn.classList.add('is-read'); }
  }
  const el = document.getElementById('m-unreplied');
  el.textContent = Math.max(0, parseInt(el.textContent) - 1);
}

function renderCreatorTags() {
  document.getElementById('creator-tags').innerHTML = creators.map(c => `
    <div class="creator-tag">
      <span>@${c}</span>
      <button onclick="removeCreator('${c}')">×</button>
    </div>`).join('');
}

function addCreator() {
  const input = document.getElementById('creator-input');
  const val = input.value.trim().replace('@', '');
  if (!val || creators.includes(val)) { input.value = ''; return; }
  creators.push(val);
  saveCreators();
  renderCreatorTags();
  input.value = '';
}

function removeCreator(name) {
  creators = creators.filter(c => c !== name);
  saveCreators();
  renderCreatorTags();
}

async function fetchFeeds() {
  if (creators.length === 0) {
    document.getElementById('feed-status').textContent = 'クリエイターを追加してください';
    return;
  }
  const status = document.getElementById('feed-status');
  const list = document.getElementById('feed-list');
  const btn = document.getElementById('feed-btn');
  btn.disabled = true;
  status.className = 'status loading';
  status.textContent = 'フィードを取得中...';
  list.innerHTML = '';

  let allItems = [];
  const creatorProfiles = {};
  for (const creator of creators) {
    try {
      const apiUrl = `https://note.com/api/v2/creators/${creator}/contents?kind=note&page=1&per=20`;
      const res = await fetchWithCors(apiUrl);
      if (!res || !res.ok) throw new Error('記事の取得に失敗しました');
      const data = await res.json();
      const notes = data.data?.contents || [];
      notes.forEach(n => {
        allItems.push({
          title: n.name || n.title || '',
          link: `https://note.com/${creator}/n/${n.key}`,
          pubDate: n.publishAt || n.published_at || n.createdAt || n.created_at || '',
          thumbnail: n.eyecatch || '',
          description: n.body || '',
          creatorName: creator
        });
      });
    } catch(e) {}
    try {
      const profileRes = await fetchWithCors(`https://note.com/api/v2/creators/${creator}`);
      if (profileRes && profileRes.ok) {
        const profileData = await profileRes.json();
        const u = profileData.data;
        creatorProfiles[creator] = { nickname: u.nickname || u.name || creator, avatar: u.profileImageUrl || '' };
      }
    } catch(e) {}
    if (!creatorProfiles[creator]) creatorProfiles[creator] = { nickname: creator, avatar: '' };
  }

  if (allItems.length === 0) {
    list.innerHTML = '<div class="empty">記事が取得できませんでした</div>';
  } else {
    const grouped = {};
    creators.forEach(c => { grouped[c] = []; });
    allItems.forEach(item => {
      if (!grouped[item.creatorName]) grouped[item.creatorName] = [];
      grouped[item.creatorName].push(item);
    });
    Object.keys(grouped).forEach(creator => {
      grouped[creator].sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
    });

    document.getElementById('feed-toolbar').style.display = 'flex';
    document.getElementById('hide-read-toggle').checked = hideRead;

    let html = '';
    creators.forEach(creator => {
      const items = grouped[creator] || [];
      const isCollapsed = !expandedGroups.includes(creator);
      const unreadCount = items.filter(item => !readFeeds.includes(feedId(item))).length;
      html += `<div class="feed-group">
        <div class="feed-group-header ${isCollapsed ? 'collapsed' : ''}" data-group="${creator}" onclick="toggleGroup('${creator}')">
          <span class="group-toggle">▼</span>
          ${creatorProfiles[creator].avatar ? `<img class="group-avatar" src="${creatorProfiles[creator].avatar}" onerror="this.style.display='none'" />` : ''}
          <span class="group-name">${creatorProfiles[creator].nickname}</span>
          <span class="group-count">${unreadCount > 0 ? unreadCount + '件の新着' : '新着なし'}</span>
          <span class="group-actions">
            <button class="btn-sm" onclick="event.stopPropagation();markCreatorRead('${creator}')">全て既読</button>
          </span>
        </div>
        <div class="feed-group-body ${isCollapsed ? 'collapsed' : ''}" data-group-body="${creator}" data-creator="${creator}">`;
      if (items.length === 0) {
        html += '<div class="empty">記事を取得できませんでした</div>';
      } else {
        items.forEach(item => {
          const date = new Date(item.pubDate).toLocaleDateString('ja-JP');
          const thumb = item.thumbnail || '';
          const id = feedId(item);
          const isRead = readFeeds.includes(id);
          html += `
            <div class="feed-card ${isRead ? 'read' : ''}" data-feed-id="${id}" ${isRead && hideRead ? 'style="display:none"' : ''}>
              ${thumb ? `<img class="feed-thumb" src="${thumb}" onerror="this.style.display='none'" />` : '<div class="feed-thumb"></div>'}
              <div class="feed-info">
                <div class="title"><a href="${item.link}" target="_blank">${item.title}</a></div>
                <div class="date">${date}</div>
              </div>
              <button class="read-btn ${isRead ? 'is-read' : ''}" onclick="markFeedRead('${id.replace(/'/g, "\\'")}')">${isRead ? '既読' : '既読にする'}</button>
            </div>`;
        });
      }
      html += '</div></div>';
    });
    list.innerHTML = html;
  }

  status.className = 'status';
  status.textContent = `${allItems.length}件の記事を取得しました`;
  btn.disabled = false;
}

renderCreatorTags();
</script>
</body>
</html>
